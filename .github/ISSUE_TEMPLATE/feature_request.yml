name: Feature request
about: Suggest a new feature or enhancement
title: "Feature: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a new feature! Please fill out the template below.

  - type: textarea
    attributes:
      label: Feature description
      description: What do you want to add?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Acceptance criteria
      description: How do we know it’s done?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Screenshots, mockups, design links, etc.
    validations:
      required: false
