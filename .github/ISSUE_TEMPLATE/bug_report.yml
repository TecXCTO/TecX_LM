name: Bug report
about: Report a bug or unexpected behavior
title: "Bug: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the template below.

  - type: textarea
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: input
    attributes:
      label: Actual behavior
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional context
      description: Screenshots, logs, stack traces, etc.
    validations:
      required: false
