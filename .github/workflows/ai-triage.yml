name: "AI Issue Triage"

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: "Analyze Issue with AI"
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = context.payload.issue.body;
            const issueTitle = context.payload.issue.title;
            
            // 2026 Prompt for Scientific AI Triage
            const prompt = `
              Analyze this GitHub issue for the 'Resonance-LLM' project.
              Title: ${issueTitle}
              Body: ${issueBody}
              
              Identify the category: 
              1. 'bug' (Code error or crash)
              2. 'physics-logic' (Hallucination or math error in resonance formulas)
              3. 'hardware-support' (Issues with B300/H100/RTX setup)
              4. 'feature-request' (New physics domains or data requests)
              
              Respond with ONLY the category name.
            `;

            // Call to your triage model (e.g., OpenAI or a custom endpoint)
            const category = await callAITriageModel(prompt); 

            // Automatically label the issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [category.toLowerCase()]
            });
